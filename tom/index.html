<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>headermain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            /* 글꼴 고딕체 */
            color: black;
            line-height: 1.6;
            /* 줄간격 1.6배수 */
        }

        img {
            width: 100%;
            display: block;
            /*여백 높이 너비 적용*/
        }

        a {
            text-decoration: none;
            color: #333;
        }

        header {
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
        }

        .logo {
            margin: 0;
        }

        /*너비 글자 세로배치 적용 */
        .logo img {
            height: 60px;
            /*40 60 72px*/
            width: auto;
            display: block;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            /*양끝으로 배치*/
            align-items: center;
            /*세로 정렬*/
            padding: 16px 8%;
        }

        nav a {
            margin-left: 32px;
            font-size: 14px;
            font-weight: bold;
        }

        main {
            height: 100vh;
            /*화면 풀높이 100퍼센트*/
            background: url(img/main.jpg) no-repeat center/cover;
        }

        section {
            padding: 120px 8%;
        }

        section h1 {
            text-align: center;
            margin-bottom: 24px;
        }

        section h2 {
            text-align: center;
            margin-bottom: 16px;
            border-bottom: 1px solid black;
        }

        section h3 {
            margin-bottom: 16px;
        }

        .sec1 {
            background-color: azure;
        }

        .ct1 {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .c1 {
            width: 22%;
        }

        .ct2 {
            display: flex;
        }

        .c2 {
            width: 48%;
        }

        footer {
            background: #1a1a1a;
            color: white;
            padding: 40px 80px;
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 30px;
        }

        .footer-item {
           width:23%;
           
        }

        .footer-item h3 {
            margin-bottom: 15px;
        }

        .footer-item a {
            display: block;
            color: #888;
            text-decoration: none;
            margin-bottom: 8px;
        }

        footer .copy {
            width: 100%;
            text-align: center;
            margin-top: 30px;
            color: #777;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-inner"> <!--큰박스-->
            <div class="logo">
                <a href="index.html"> <!--첫페이지 파일명-->
                    <img src="img/logo.svg" alt="브랜드로고이미지">
                </a>
            </div>
            <nav>
                <a href="#">TOM N TOMS</a> <a href="#">MENU</a>
                <a href="#">EVENT</a> <a href="#">STORE</a>
                <a href="#">MYTOM</a> <a href="#">SERVICE</a>
                <a href="#">COMMUNITY</a>
            </nav>
        </div>
    </header>
    <main></main>
    <section class="sec1">
        <h3>TOM AND TOMS MENU</h3>
        <div class="ct1">
            <div class="c1"> <img src="img/p1.png"></div>
            <div class="c1"> <img src="img/blue.png"></div>
            <div class="c1"> <img src="img/tea.png"></div>
            <div class="c1"> <img src="img/mango.png"></div>
            <div class="c1"> <img src="img/mint.png"></div>
            <div class="c1"> <img src="img/mocha.png"></div>
            <div class="c1"> <img src="img/caramel.png"></div>
            <div class="c1"> <img src="img/blueberry.png"></div>
        </div>
    </section>
    <section class="sec2">
        <h3>VARIOUS BEVERAGE</h3>
        <div class="ct2">
            <div class="c2"> <img src="img/sec3.jpg"></div>
            <div class="c2"> <img src="img/sec4.jpg"></div>
        </div>
    </section>

    </div>
    <footer>
        <div class="footer-content">
            <div class="footer-item">
                <a href="#">회사소개</a>
                <a href="#">제휴문의</a>
            </div>
            <div class="footer-item">
                <a href="#">채용안내</a>
                <a href="#">사이트맵</a>
                <a href="#">찾아오시는길</a>
            </div>
            <div class="footer-item">
                <a href="#">개인정보보호처리방침</a>
                <a href="#">마이탐 이용약관</a>
                <a href="#">영상정보처리기기 운영관리 방침</a>
            </div>
            <div class="footer-item">
                <a href="#">Language</a>
                <a href="#">한국어 ENGLISH 中文</a>
            </div>
        </div>
        <div class="copy">
            <p>© 2026 TOM N TOMS COFFEE. All rights reserved.</p>
        </div>
    </footer>
</body>

</html>
